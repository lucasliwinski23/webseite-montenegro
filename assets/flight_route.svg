<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F2B4D"/>
      <stop offset="100%" stop-color="#0F1730"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Simplified Europe outline -->
  <g fill="#2A3B5F" stroke="#3D5283" stroke-width="1.5" opacity="0.85">
    <!-- Germany/Central EU block -->
    <path d="M 280 140 Q 300 130, 340 135 L 390 130 L 430 150 L 450 180 L 440 210 L 420 230 L 400 240 L 370 245 L 340 240 L 310 230 L 290 210 L 280 180 Z"/>
    <!-- Italy -->
    <path d="M 370 250 L 390 260 L 420 280 L 440 320 L 445 360 L 430 390 L 410 410 L 390 405 L 380 380 L 370 350 L 365 320 L 365 290 Z"/>
    <!-- Balkans/Montenegro region -->
    <path d="M 445 250 L 490 260 L 530 280 L 560 310 L 575 350 L 560 380 L 530 395 L 495 390 L 470 370 L 450 340 L 445 305 Z"/>
    <!-- Greece -->
    <path d="M 530 400 L 560 410 L 580 430 L 570 450 L 545 445 L 525 420 Z"/>
    <!-- Iberia -->
    <path d="M 130 240 L 180 230 L 220 250 L 225 290 L 200 320 L 160 320 L 135 300 L 120 275 Z"/>
    <!-- France -->
    <path d="M 200 180 L 270 175 L 280 210 L 270 245 L 235 255 L 210 245 L 195 215 Z"/>
    <!-- UK -->
    <path d="M 180 110 L 220 105 L 235 135 L 220 160 L 195 160 L 180 140 Z"/>
    <!-- Scandinavia (bottom) -->
    <path d="M 320 60 L 380 55 L 400 85 L 390 115 L 360 125 L 330 115 L 310 90 Z"/>
  </g>

  <!-- Flight path arc -->
  <path d="M 330 175 Q 420 230, 505 330" fill="none" stroke="#D97842" stroke-width="3" stroke-dasharray="8,5" filter="url(#glow)"/>

  <!-- Departure: Dortmund -->
  <circle cx="330" cy="175" r="10" fill="#D97842" filter="url(#glow)"/>
  <circle cx="330" cy="175" r="5" fill="#F4EDE3"/>

  <!-- Arrival: Podgorica -->
  <circle cx="505" cy="330" r="10" fill="#D97842" filter="url(#glow)"/>
  <circle cx="505" cy="330" r="5" fill="#F4EDE3"/>

  <!-- Plane icon on the path -->
  <g transform="translate(418, 250) rotate(45)">
    <path d="M -18 0 L 18 -4 L 22 0 L 18 4 Z M -8 -8 L -3 -8 L 0 -3 M -8 8 L -3 8 L 0 3" fill="#F4EDE3" stroke="#F4EDE3" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- Labels for cities -->
  <g font-family="Georgia, serif" fill="#F4EDE3">
    <text x="340" y="168" font-size="18" font-weight="bold">Dortmund (DTM)</text>
    <text x="340" y="188" font-size="12" fill="#CADCFC">09:31 Abflug</text>

    <text x="520" y="325" font-size="18" font-weight="bold">Podgorica (TGD)</text>
    <text x="520" y="345" font-size="12" fill="#CADCFC">11:45 Ankunft</text>
  </g>

  <!-- Distance + time info -->
  <g font-family="Helvetica, sans-serif" fill="#CADCFC" opacity="0.9">
    <text x="400" y="440" font-size="14" text-anchor="middle" font-weight="bold">W6 7602 · Wizz Air</text>
    <text x="400" y="460" font-size="12" text-anchor="middle">Flugzeit 2:15 h  ·  Distanz 1.344 km</text>
  </g>

  <!-- Top title -->
  <text x="400" y="45" font-family="Georgia, serif" font-size="22" fill="#F4EDE3" text-anchor="middle" font-weight="bold" letter-spacing="2">DIE ANREISE</text>
  <text x="400" y="72" font-family="Helvetica, sans-serif" font-size="13" fill="#D97842" text-anchor="middle" letter-spacing="3">FREITAG · 24. APRIL 2026</text>

  <!-- Return flight info bottom right -->
  <g font-family="Helvetica, sans-serif" fill="#CADCFC" opacity="0.7">
    <text x="780" y="485" font-size="11" text-anchor="end" font-style="italic">Rückflug: W6 7601 · Sonntag 17:30 Uhr</text>
  </g>
</svg>
