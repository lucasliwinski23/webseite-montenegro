<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4EDE3"/>
      <stop offset="100%" stop-color="#EBE1D0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>

  <!-- Moraca river - curves from top-left to bottom-right -->
  <path d="M 50 380 Q 180 360, 280 370 Q 380 380, 450 430 Q 520 470, 620 490 L 900 510"
        fill="none" stroke="#7FA9BF" stroke-width="22" opacity="0.6"/>
  <path d="M 50 380 Q 180 360, 280 370 Q 380 380, 450 430 Q 520 470, 620 490 L 900 510"
        fill="none" stroke="#A8C8D8" stroke-width="14" opacity="0.8"/>
  <text x="180" y="355" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#4A6B7C">Morača Fluss</text>

  <!-- Ribnica river -->
  <path d="M 500 180 Q 540 240, 560 310 Q 575 365, 565 420"
        fill="none" stroke="#7FA9BF" stroke-width="10" opacity="0.5"/>

  <!-- Main streets - light grey -->
  <g stroke="#C9C1B3" stroke-width="6" fill="none" opacity="0.6">
    <!-- Kralja Nikole (main diagonal) -->
    <line x1="340" y1="520" x2="620" y2="260"/>
    <!-- Slobode -->
    <line x1="280" y1="180" x2="620" y2="340"/>
    <!-- Bulevar Svetog Petra Cetinjskog -->
    <line x1="100" y1="280" x2="570" y2="300"/>
    <!-- Njegoševa -->
    <line x1="430" y1="120" x2="530" y2="500"/>
    <!-- Bokeška -->
    <line x1="490" y1="280" x2="540" y2="420"/>
  </g>

  <!-- Trg Republike (plaza) -->
  <rect x="478" y="300" width="50" height="35" fill="#D9CEBC" opacity="0.8" rx="2"/>
  <text x="503" y="322" font-family="Helvetica" font-size="8" fill="#5A4A35" text-anchor="middle" font-weight="bold">Trg Republike</text>

  <!-- ========== LOCATIONS ========== -->

  <!-- WOHNUNG (star) -->
  <g transform="translate(520, 290)">
    <polygon points="0,-16 4,-5 15,-5 6,3 9,14 0,7 -9,14 -6,3 -15,-5 -4,-5" fill="#B85042" stroke="#7A2F25" stroke-width="2"/>
    <text x="22" y="0" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1F2B4D">Wohnung</text>
    <text x="22" y="14" font-family="Helvetica" font-size="10" fill="#4B5563">Slobode 21</text>
  </g>

  <!-- RESTAURANTS - orange/terracotta dots -->
  <g font-family="Helvetica, sans-serif" font-size="10" fill="#1F2B4D">
    <!-- Gostiona 1928 -->
    <circle cx="510" cy="310" r="7" fill="#D97842" stroke="#1F2B4D" stroke-width="1.5"/>
    <text x="462" y="276" font-weight="bold" fill="#D97842">Gostiona 1928</text>

    <!-- Lanterna -->
    <circle cx="470" cy="360" r="7" fill="#D97842" stroke="#1F2B4D" stroke-width="1.5"/>
    <text x="355" y="365" font-weight="bold" fill="#D97842">Lanterna</text>

    <!-- Diplomat -->
    <circle cx="545" cy="320" r="7" fill="#D97842" stroke="#1F2B4D" stroke-width="1.5"/>
    <text x="562" y="318" font-weight="bold" fill="#D97842">Diplomat</text>

    <!-- Protokol -->
    <circle cx="725" cy="155" r="7" fill="#D97842" stroke="#1F2B4D" stroke-width="1.5"/>
    <text x="740" y="158" font-weight="bold" fill="#D97842">Protokol</text>
    <line x1="725" y1="155" x2="550" y2="310" stroke="#D97842" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>

    <!-- Babi Gourmet -->
    <circle cx="510" cy="315" r="6" fill="#D97842" stroke="#1F2B4D" stroke-width="1"/>
    <text x="450" y="259" font-weight="bold" fill="#D97842">Babi Gourmet</text>

    <!-- Steak House -->
    <circle cx="515" cy="340" r="6" fill="#D97842" stroke="#1F2B4D" stroke-width="1"/>
    <text x="540" y="345" font-weight="bold" fill="#D97842">Steak House</text>

    <!-- SPAGO -->
    <circle cx="200" cy="320" r="7" fill="#D97842" stroke="#1F2B4D" stroke-width="1.5"/>
    <text x="215" y="318" font-weight="bold" fill="#D97842">SPAGO</text>

    <!-- Stara Kuca (off-map) -->
    <circle cx="780" cy="80" r="7" fill="#D97842" stroke="#1F2B4D" stroke-width="1.5"/>
    <text x="750" y="62" font-weight="bold" fill="#D97842">Stara Kuća</text>
    <text x="748" y="105" font-size="8" fill="#6B7280" font-style="italic">3 km außerhalb</text>
  </g>

  <!-- KNEIPEN - navy dots -->
  <g font-family="Helvetica, sans-serif" font-size="10" fill="#1F2B4D">
    <!-- PG Akademija piva -->
    <circle cx="195" cy="305" r="7" fill="#1F2B4D" stroke="#F4EDE3" stroke-width="1.5"/>
    <text x="100" y="288" font-weight="bold">PG Akademija piva</text>

    <!-- Pub WWW -->
    <circle cx="500" cy="305" r="7" fill="#1F2B4D" stroke="#F4EDE3" stroke-width="1.5"/>
    <text x="438" y="295" font-weight="bold">Pub WWW</text>

    <!-- Bogart -->
    <circle cx="435" cy="235" r="7" fill="#1F2B4D" stroke="#F4EDE3" stroke-width="1.5"/>
    <text x="356" y="233" font-weight="bold">Bogart</text>

    <!-- Fermentor -->
    <circle cx="760" cy="405" r="7" fill="#1F2B4D" stroke="#F4EDE3" stroke-width="1.5"/>
    <text x="680" y="425" font-weight="bold">Fermentor</text>

    <!-- Itaka -->
    <circle cx="580" cy="425" r="7" fill="#1F2B4D" stroke="#F4EDE3" stroke-width="1.5"/>
    <text x="600" y="440" font-weight="bold">Itaka</text>

    <!-- Morrison -->
    <circle cx="515" cy="310" r="6" fill="#1F2B4D" stroke="#F4EDE3" stroke-width="1"/>
    <text x="540" y="268" font-weight="bold">Morrison</text>
  </g>

  <!-- SUPERMÄRKTE - small green dots -->
  <g font-family="Helvetica, sans-serif" font-size="9" fill="#2E5C3A">
    <circle cx="500" cy="295" r="5" fill="#7FA654" stroke="#2E5C3A" stroke-width="1"/>
    <text x="438" y="265" font-weight="bold">Mimoza</text>

    <circle cx="528" cy="303" r="5" fill="#7FA654" stroke="#2E5C3A" stroke-width="1"/>
    <text x="608" y="303" font-weight="bold">VOLI</text>
    <line x1="528" y1="303" x2="605" y2="300" stroke="#7FA654" stroke-width="0.5" opacity="0.6"/>

    <circle cx="555" cy="296" r="5" fill="#7FA654" stroke="#2E5C3A" stroke-width="1"/>
    <text x="605" y="288" font-weight="bold">iDEA</text>
  </g>

  <!-- SIGHTSEEING - purple -->
  <g font-family="Helvetica, sans-serif" font-size="10" fill="#5D4478">
    <!-- Sahat Kula -->
    <g transform="translate(440, 410)">
      <rect x="-5" y="-8" width="10" height="16" fill="#8B7AA8" stroke="#3D2E57" stroke-width="1"/>
      <circle cx="0" cy="-5" r="3" fill="#F4EDE3" stroke="#3D2E57" stroke-width="0.5"/>
    </g>
    <text x="395" y="450" font-weight="bold" fill="#5D4478">Sahat Kula</text>

    <!-- Stara Varoš area -->
    <rect x="380" y="400" width="140" height="40" fill="#8B7AA8" fill-opacity="0.15" stroke="#8B7AA8" stroke-dasharray="3,3" stroke-width="1"/>
    <text x="450" y="395" font-weight="bold" fill="#5D4478" text-anchor="middle">Stara Varoš</text>

    <!-- Millennium Bridge -->
    <g transform="translate(150, 405)">
      <path d="M -25 0 Q 0 -20, 25 0" fill="none" stroke="#5D4478" stroke-width="3"/>
      <line x1="-25" y1="0" x2="-25" y2="-10" stroke="#5D4478" stroke-width="2"/>
      <line x1="25" y1="0" x2="25" y2="-10" stroke="#5D4478" stroke-width="2"/>
    </g>
    <text x="100" y="440" font-weight="bold" fill="#5D4478">Millennium-Brücke</text>
  </g>

  <!-- SOUVENIRS -->
  <g font-family="Helvetica, sans-serif" font-size="10" fill="#7A4A0F">
    <g transform="translate(580, 310)">
      <path d="M -6 -7 L 6 -7 L 7 -4 L 8 7 L -8 7 L -7 -4 Z" fill="#D4A056" stroke="#7A4A0F" stroke-width="1"/>
      <path d="M -4 -7 Q -4 -12, 0 -12 Q 4 -12, 4 -7" fill="none" stroke="#7A4A0F" stroke-width="1"/>
    </g>
    <text x="595" y="300" font-weight="bold" fill="#7A4A0F">Pg Souvenir</text>
  </g>

  <!-- ========== LEGEND ========== -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="260" height="175" fill="#FFFFFF" stroke="#1F2B4D" stroke-width="1" opacity="0.95" rx="6"/>

    <text x="130" y="25" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1F2B4D" text-anchor="middle">Legende</text>

    <polygon points="14,49 17,39 21,38 23,42 27,42 24,47 25,52 21,50 17,52" transform="translate(-1, -3)" fill="#B85042"/>
    <text x="38" y="52" font-family="Helvetica" font-size="12" fill="#1F2B4D">Unsere Wohnung</text>

    <circle cx="20" cy="72" r="6" fill="#D97842" stroke="#1F2B4D" stroke-width="1.5"/>
    <text x="38" y="76" font-family="Helvetica" font-size="12" fill="#1F2B4D">Restaurant</text>

    <circle cx="20" cy="94" r="6" fill="#1F2B4D" stroke="#F4EDE3" stroke-width="1.5"/>
    <text x="38" y="98" font-family="Helvetica" font-size="12" fill="#1F2B4D">Kneipe / Bar</text>

    <circle cx="20" cy="116" r="5" fill="#7FA654" stroke="#2E5C3A" stroke-width="1"/>
    <text x="38" y="120" font-family="Helvetica" font-size="12" fill="#1F2B4D">Supermarkt</text>

    <g transform="translate(16, 135)">
      <rect x="-5" y="-8" width="10" height="14" fill="#8B7AA8" stroke="#3D2E57" stroke-width="1"/>
    </g>
    <text x="38" y="142" font-family="Helvetica" font-size="12" fill="#1F2B4D">Sehenswürdigkeit</text>

    <g transform="translate(14, 157)">
      <path d="M -6 -5 L 6 -5 L 7 -2 L 8 5 L -8 5 L -7 -2 Z" fill="#D4A056" stroke="#7A4A0F" stroke-width="1"/>
    </g>
    <text x="38" y="164" font-family="Helvetica" font-size="12" fill="#1F2B4D">Souvenir-Shop</text>
  </g>

  <!-- Title -->
  <text x="450" y="35" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1F2B4D" text-anchor="middle">STADTZENTRUM PODGORICA</text>
  <text x="450" y="55" font-family="Helvetica, sans-serif" font-size="12" fill="#D97842" text-anchor="middle" letter-spacing="3">UNSERE SPOTS IM ÜBERBLICK</text>

  <!-- Compass -->
  <g transform="translate(840, 560)">
    <circle r="25" fill="#FFFFFF" stroke="#1F2B4D" stroke-width="1"/>
    <polygon points="0,-18 -5,6 0,3 5,6" fill="#B85042"/>
    <polygon points="0,18 -5,-6 0,-3 5,-6" fill="#1F2B4D"/>
    <text x="0" y="-28" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#1F2B4D" text-anchor="middle">N</text>
  </g>
</svg>
